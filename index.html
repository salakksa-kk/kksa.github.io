<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantonese Pinyin Trainer Ultra</title>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            /* Fix layout to the top of the page */
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0;
            /* Space from the very top of the screen */
            padding-top: 2rem; 
            overflow-x: hidden;
            box-sizing: border-box;
        }

        #game-container { 
            background: white; 
            padding: 2rem; 
            border-radius: 1.5rem; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            width: 90%;
            max-width: 500px; 
            text-align: center;
            margin: 10px;
        }
        
        .hidden { display: none !important; }
        .phrase-display { font-size: 3rem; font-weight: bold; margin-bottom: 0.5rem; color: #0f172a; }
        
        input { 
            width: 100%; 
            padding: 1.2rem; 
            font-size: 1.3rem; 
            border: 2px solid #e2e8f0; 
            border-radius: 0.75rem; 
            outline: none; 
            transition: all 0.2s; 
            box-sizing: border-box; 
            text-align: center;
            inputmode: text;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 1rem 2rem; 
            border-radius: 0.75rem; 
            cursor: pointer; 
            margin: 1rem 0; 
            font-size: 1.1rem; 
            font-weight: 600; 
            width: 100%; 
        }

        button.secondary { background: #64748b; margin-top: 0.5rem; }

        .summary-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; font-size: 0.85rem; }
        .summary-table th { background: #f1f5f9; padding: 0.5rem; text-align: left; }
        .summary-table td { padding: 0.5rem; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .row-wrong { background: #fef2f2; color: var(--error); }
        
        .feedback { height: 2.5rem; margin-top: 1rem; font-size: 1.3rem; font-weight: bold; }
        .tick { color: var(--success); }
        .cross { color: var(--error); }
        .instruction { font-size: 0.85rem; color: #64748b; margin-top: 0.5rem; }
        #progress { color: #94a3b8; font-weight: bold; margin-bottom: 0.5rem; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-screen">
        <h1>Cantonese Trainer</h1>
        <p style="color: #64748b; margin-bottom: 2rem;">Practice Jyutping anywhere.</p>
        <button onclick="initRound('new')">Start New Round</button>
        <button id="review-btn" class="secondary hidden" onclick="initRound('review')">Review Mistakes (0)</button>
    </div>

    <div id="play-screen" class="hidden">
        <div id="progress">PHRASE 1 / 10</div>
        <div class="phrase-display" id="target-phrase">---</div>
        <input type="text" id="user-input" placeholder="Type here..." autocomplete="off" spellcheck="false">
        <div id="feedback-area" class="feedback"></div>
        <div id="hint-area" class="hidden"></div>
        <div id="next-instruction" class="instruction hidden">⏎ Press <b>Enter</b> to continue</div>
    </div>

    <div id="summary-screen" class="hidden">
        <h2>Results</h2>
        <div id="final-score" style="font-size: 3rem; font-weight: bold; color: var(--primary);">0%</div>
        <div style="max-height: 300px; overflow-y: auto; margin: 1.5rem 0; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
            <table class="summary-table">
                <thead><tr><th>Phrase</th><th>Status</th><th>Pinyin</th></tr></thead>
                <tbody id="summary-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()">Back to Home</button>
    </div>
</div>

  let state = {
        pool: [],
        roundHistory: [],
        currentIndex: 0,
        attempts: 0,
        correctCount: 0,
        isWaitingForNext: false
    };

    const inputField = document.getElementById('user-input');

    // Force focus when the user touches the input area
    inputField.addEventListener('touchstart', function() {
        if (!state.isWaitingForNext) {
            inputField.focus();
        }
    });

    // Option 3: Block typing after failure but keep keyboard up
    inputField.addEventListener('keydown', (e) => {
        if (state.isWaitingForNext && e.key !== 'Enter') {
            e.preventDefault();
        }
    });

    function updateUI() {
        const mistakes = JSON.parse(localStorage.getItem('cantonese_mistakes') || "[]");
        const btn = document.getElementById('review-btn');
        if (mistakes.length > 0) {
            btn.innerText = `Review Mistakes (${mistakes.length})`;
            btn.classList.remove('hidden');
        } else {
            btn.classList.add('hidden');
        }
    }

    function normalize(str) {
        return str.toLowerCase().replace(/[0-9\s]/g, '');
    }

    function initRound(mode) {
        const mistakes = JSON.parse(localStorage.getItem('cantonese_mistakes') || "[]");
        state.pool = (mode === 'review') ? 
            mistakes.sort(() => 0.5 - Math.random()).slice(0, 10) : 
            [...masterData].sort(() => 0.5 - Math.random()).slice(0, 10);

        state.currentIndex = 0;
        state.correctCount = 0;
        state.roundHistory = [];
        state.isWaitingForNext = false;
        showScreen('play-screen');
        nextQuestion();
    }

    function showScreen(id) {
        ['setup-screen', 'play-screen', 'summary-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function nextQuestion() {
        if (state.currentIndex >= state.pool.length) {
            showSummary();
            return;
        }
        state.attempts = 0;
        state.isWaitingForNext = false;
        const current = state.pool[state.currentIndex];
        
        document.getElementById('target-phrase').innerText = current.c;
        document.getElementById('progress').innerText = `PHRASE ${state.currentIndex + 1} / ${state.pool.length}`;
        document.getElementById('feedback-area').innerHTML = '';
        document.getElementById('hint-area').classList.add('hidden');
        document.getElementById('next-instruction').classList.add('hidden');
        
        inputField.value = '';
        inputField.focus();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (state.isWaitingForNext) proceed();
            else if (document.activeElement === inputField && inputField.value.trim() !== "") checkAnswer();
        }
    });

function checkAnswer() {
    const current = state.pool[state.currentIndex];
    const isMatch = normalize(inputField.value) === normalize(current.p);
    const feedback = document.getElementById('feedback-area');

    if (isMatch) {
        feedback.innerHTML = '<span class="tick">✔ Correct</span>';
        
        // --- ADD AUDIO HERE ---
        speak(current.c); 
        
        state.correctCount++;
        state.roundHistory.push({ c: current.c, p: current.p, wrong: false });
        removeFromMistakes(current);
        setTimeout(proceed, 800);
    } else {
        state.attempts++;
        feedback.innerHTML = '<span class="cross">✘ Incorrect</span>';
        if (state.attempts >= 2) {
            state.roundHistory.push({ c: current.c, p: current.p, wrong: true });
            saveToMistakes(current);
            
            // --- ADD AUDIO HERE ---
            speak(current.c); 

            const hint = document.getElementById('hint-area');
            hint.innerHTML = `<div style="color:var(--error); margin-top:10px">Correct Pinyin: <b>${current.p}</b></div>`;
            hint.classList.remove('hidden');
            document.getElementById('next-instruction').classList.remove('hidden');
            state.isWaitingForNext = true;
        } else {
            inputField.select();
        }
    }
}

    function saveToMistakes(phrase) {
        let saved = JSON.parse(localStorage.getItem('cantonese_mistakes') || "[]");
        if (!saved.some(item => item.c === phrase.c)) {
            saved.push(phrase);
            localStorage.setItem('cantonese_mistakes', JSON.stringify(saved));
        }
    }

    function removeFromMistakes(phrase) {
        let saved = JSON.parse(localStorage.getItem('cantonese_mistakes') || "[]");
        saved = saved.filter(item => item.c !== phrase.c);
        localStorage.setItem('cantonese_mistakes', JSON.stringify(saved));
    }

    function proceed() {
        state.currentIndex++;
        nextQuestion();
    }

    function showSummary() {
        showScreen('summary-screen');
        const score = Math.round((state.correctCount / state.pool.length) * 100);
        document.getElementById('final-score').innerText = `${score}%`;
        const tbody = document.getElementById('summary-body');
        tbody.innerHTML = '';
        state.roundHistory.forEach(item => {
            const row = document.createElement('tr');
            row.className = item.wrong ? 'row-wrong' : '';
            row.innerHTML = `<td><b>${item.c}</b></td><td>${item.wrong ? '✘' : '✔'}</td><td>${item.p}</td>`;
            tbody.appendChild(row);
        });
        updateUI();
    }

    function speak(text) {
    // Create a new speech request
    const utterance = new SpeechSynthesisUtterance(text);
    
    // Set the language to Cantonese (Hong Kong)
    utterance.lang = 'zh-HK';
    
    // Adjust pitch and rate to your preference
    utterance.pitch = 1.0;
    utterance.rate = 0.9; // Slightly slower for clearer learning
    
    // Execute the speech
    window.speechSynthesis.speak(utterance);
}
